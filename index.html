<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyWings Airlines</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f7fa;
}

header{
    background:#05164d;
    color:white;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.hero{
    height:500px;
    background:url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1600')
    center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero-box{
    background:rgba(255,255,255,0.95);
    padding:40px;
    border-radius:15px;
    width:500px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.hero-box h1{
    color:#05164d;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#05164d;
    color:white;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

.section{
    max-width:1200px;
    margin:50px auto;
    padding:0 20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.message{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <div class="logo">SkyWings Airlines</div>
    <div>Premium Travel Experience</div>
</header>

<section class="hero">
    <div class="hero-box">
        <h1>Willkommen bei SkyWings</h1>

        <h3>Demo Login</h3>
        <input type="email" id="email" placeholder="E-Mail">
        <input type="password" id="password" placeholder="Passwort">

        <button onclick="loginDemo()">Anmelden</button>

        <br><br>

        <h3>Aktionscode</h3>
        <input type="text" id="promoCode" placeholder="Code eingeben">

        <button onclick="redeemCode()">Code einlösen</button>

        <div id="message" class="message"></div>
    </div>
</section>



<script>
function loginDemo(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(email && password){
        document.getElementById("message").innerHTML =
            "✓ Demo-Anmeldung erfolgreich";
    }else{
        document.getElementById("message").innerHTML =
            "Bitte alle Felder ausfüllen.";
    }
}

function redeemCode(){
    const code = document.getElementById("promoCode").value.trim();

    if(code === "SKYWINGS2026"){
        document.getElementById("message").innerHTML =
            "✓ Aktionscode erfolgreich eingelöst!";
    }else{
        document.getElementById("message").innerHTML =
            "✗ Ungültiger Aktionscode.";
    }
}
</script>

</body>
</html>
